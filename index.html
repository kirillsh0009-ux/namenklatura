<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Промышленность Беларуси</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --panel: #161a24;
    --border: #252a38;
    --accent: #4f7fff;
    --accent2: #ff6b4f;
    --text: #e8eaf2;
    --text-dim: #7a8099;
    --hover: #1e2436;
    --active: #1a2340;
    --tag-bg: #1e2436;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    z-index: 100;
    flex-shrink: 0;
  }
  header .flag { font-size: 22px; }
  header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }
  header .sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
    letter-spacing: 0.05em;
  }

  /* MOBILE TAB BAR */
  .mobile-tabs {
    display: none;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .mobile-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .mobile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  /* SIDEBAR */
  .sidebar {
    width: 320px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* MOBILE */
  @media (max-width: 640px) {
    header h1 { font-size: 13px; }
    header .sub { display: none; }
    header { padding: 10px 14px; }

    .mobile-tabs { display: flex; }

    .app { flex-direction: column; }

    .sidebar {
      width: 100%;
      min-width: unset;
      border-right: none;
      border-bottom: 1px solid var(--border);
      display: none;
      flex: 1;
      overflow: hidden;
    }
    .sidebar.mobile-visible { display: flex; }

    #map { display: none; }
    #map.mobile-visible { display: block; flex: 1; }

    .sector-tabs { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 8px; }
    .sector-tabs::-webkit-scrollbar { display: none; }

    .item { padding: 12px 14px; }
    .item-name { font-size: 13px; }
    .item-company { font-size: 12px; }
    .item-city { font-size: 11px; }
  }
  .search-wrap {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Geologica', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-dim); }

  .sector-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sector-tab {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.03em;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    background: var(--tag-bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .sector-tab:hover { color: var(--text); border-color: var(--accent); }
  .sector-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sector-tab.all-tab.active { background: var(--accent2); border-color: var(--accent2); }

  .region-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  .region-tab {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.03em;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    background: var(--tag-bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .region-tab:hover { color: var(--text); border-color: var(--accent); }
  .region-tab.active { color: #fff; }
  .region-tab.all-reg.active { background: var(--accent2); border-color: var(--accent2); }

  .list-container {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .list-container::-webkit-scrollbar { width: 4px; }
  .list-container::-webkit-scrollbar-track { background: transparent; }
  .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sector-group { }
  .sector-header {
    padding: 8px 14px 5px;
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .sector-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .item:hover { background: var(--hover); }
  .item.active { background: var(--active); border-left: 3px solid var(--accent); padding-left: 11px; }
  .item-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .item-company {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.3;
  }
  .item-city {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-top: 2px;
  }
  .count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    padding: 3px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border);
  }

  /* MAP */
  #map {
    flex: 1;
    background: #0a0d14;
  }

  /* Custom marker */
  .custom-marker {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .marker-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .marker-dot:hover { transform: scale(1.4); }
  .marker-dot.highlighted {
    width: 16px; height: 16px;
    border: 3px solid #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.5);
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--panel) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; min-width: 200px; }
  .popup-city {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .popup-entry {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .popup-entry:last-child { border-bottom: none; }
  .popup-product { font-size: 12px; font-weight: 600; color: var(--text); }
  .popup-company { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .popup-sector-tag {
    display: inline-block;
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 3px;
    text-transform: uppercase;
  }

  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--hover) !important; }
  .leaflet-control-attribution { background: rgba(15,17,23,0.8) !important; color: var(--text-dim) !important; }
  .leaflet-control-attribution a { color: var(--text-dim) !important; }

  .no-results {
    padding: 30px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* QUIZ REGION PICKER */
  #quizRegionPicker {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1001;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 50px rgba(0,0,0,0.8);
    width: min(420px, calc(100vw - 32px));
    padding: 22px 20px;
  }
  #quizRegionPicker.visible { display: block; }
  .qrp-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .qrp-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
  .qrp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .qrp-option {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .qrp-option:hover { border-color: var(--accent); background: var(--hover); }
  .qrp-option.selected { color: #fff; }
  .qrp-option .qrp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .qrp-option .qrp-count { font-size: 10px; font-family: 'JetBrains Mono', monospace; opacity: 0.7; margin-left: auto; }
  .qrp-start-btn {
    width: 100%; padding: 11px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-family: 'Geologica', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .qrp-start-btn:hover { opacity: 0.85; }
  .quiz-btn {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quiz-btn:hover { background: var(--accent); color: #fff; }
  .quiz-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* QUIZ CARD */
  #quizCard {
    display: none;
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    width: min(420px, calc(100vw - 32px));
    padding: 16px 18px;
  }
  #quizCard.visible { display: block; }
  .quiz-progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
  .quiz-q-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 0.06em; }
  .quiz-product { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
  .quiz-company { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
  .quiz-instruction { font-size: 12px; color: var(--accent); font-style: italic; }
  .quiz-feedback { display: none; margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .quiz-feedback.good { background: #1a3a2a; color: #26de81; border: 1px solid #26de8144; }
  .quiz-feedback.ok   { background: #2a2a1a; color: #ff9f43; border: 1px solid #ff9f4344; }
  .quiz-feedback.bad  { background: #3a1a1a; color: #fc5c65; border: 1px solid #fc5c6544; }
  .quiz-feedback-sub { font-size: 11px; font-weight: 400; margin-top: 3px; opacity: 0.8; }
  .quiz-next-btn { margin-top: 10px; width: 100%; padding: 9px; background: var(--accent); color: #fff; border: none; border-radius: 7px; font-family: 'Geologica', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: none; }
  .quiz-next-btn:hover { opacity: 0.85; }

  /* QUIZ RESULTS */
  #quizResults {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.8);
    width: min(360px, calc(100vw - 40px));
    padding: 28px 24px;
    text-align: center;
  }
  #quizResults.visible { display: block; }
  .results-emoji { font-size: 48px; margin-bottom: 10px; }
  .results-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .results-score { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }
  .results-breakdown { text-align: left; margin-bottom: 20px; }
  .results-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .results-row:last-child { border-bottom: none; }
  .results-city { color: var(--text-dim); font-size: 11px; }
  .results-dist { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .results-dist.good { color: #26de81; }
  .results-dist.ok   { color: #ff9f43; }
  .results-dist.bad  { color: #fc5c65; }
  .results-again-btn { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'Geologica', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
  .results-again-btn:hover { opacity: 0.85; }
  #map.quiz-active { cursor: crosshair; }

  #map.quiz-active { cursor: crosshair; }


  /* Faction picker overlay */

    margin-top: 10px;
    width: 100%;
    padding: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    font-family: 'Geologica', sans-serif;
  }

    width: 100%; padding: 11px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-family: 'Geologica', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px;
  }

</style>
</head>
<body>

<header>
  <span class="flag">🇧🇾</span>
  <h1>Промышленность Беларуси</h1>
  <button class="quiz-btn" id="quizToggleBtn" onclick="toggleQuiz()">🎯 Тест</button>
</header>

<div class="mobile-tabs" id="mobileTabs">
  <div class="mobile-tab" id="tabList" onclick="switchMobileTab('list')">📋 Список</div>
  <div class="mobile-tab active" id="tabMap" onclick="switchMobileTab('map')">🗺 Карта</div>
</div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Поиск по продукту, предприятию, городу…">
    </div>
    <div class="sector-tabs" id="sectorTabs"></div>
    <div class="region-tabs" id="regionTabs"></div>
    <div class="count-badge" id="countBadge"></div>
    <div class="list-container" id="listContainer"></div>
  </div>
  <div id="map"></div>

  <!-- Quiz region picker -->
  <div id="quizRegionPicker">
    <div class="qrp-title">🎯 Выберите регион для теста</div>
    <div class="qrp-sub">Вы будете отвечать только по предприятиям выбранного региона</div>
    <div class="qrp-grid" id="quizRegionGrid"></div>
    <button class="qrp-start-btn" onclick="startQuizWithRegion()">Начать тест →</button>
  </div>

  <!-- Quiz card -->
  <div id="quizCard">
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
    <div class="quiz-q-num" id="quizQNum"></div>
    <div class="quiz-product" id="quizProduct"></div>
    <div class="quiz-company" id="quizCompany"></div>
    <div class="quiz-instruction" id="quizInstruction">👆 Нажмите на карте, где находится это предприятие</div>
    <div class="quiz-feedback" id="quizFeedback">
      <div id="quizFeedbackText"></div>
      <div class="quiz-feedback-sub" id="quizFeedbackSub"></div>
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" onclick="quizNext()">Следующий вопрос →</button>
  </div>

  <!-- Quiz results -->
  <div id="quizResults">
    <div class="results-emoji" id="resultsEmoji"></div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-score" id="resultsScore"></div>
    <div class="results-breakdown" id="resultsBreakdown"></div>
    <button class="results-again-btn" onclick="stopQuiz();showQuizRegionPicker()">Пройти ещё раз</button>
  </div>
</div>

<script>
const SECTORS = [
  { id: 'oil', label: 'Нефть и газ', color: '#ff9f43', short: 'НГ' },
  { id: 'metal', label: 'Металлургия', color: '#778ca3', short: 'МЕТ' },
  { id: 'machine', label: 'Машиностроение', color: '#4f7fff', short: 'МАШ' },
  { id: 'chem', label: 'Химия', color: '#26de81', short: 'ХИМ' },
  { id: 'build', label: 'Стройматериалы', color: '#fd9644', short: 'СТР' },
  { id: 'wood', label: 'Деревообработка', color: '#a55eea', short: 'ДЕР' },
  { id: 'light', label: 'Лёгкая пром.', color: '#fc5c65', short: 'ЛЁГ' },
  { id: 'food', label: 'Пищевая пром.', color: '#45aaf2', short: 'ПИЩ' },
];

const SECTOR_MAP = Object.fromEntries(SECTORS.map(s => [s.id, s]));

const REGIONS = [
  { id: 'minsk',   label: 'Минская',      short: 'МНС', color: '#4f7fff' },
  { id: 'gomel',   label: 'Гомельская',   short: 'ГМЛ', color: '#fc5c65' },
  { id: 'vitebsk', label: 'Витебская',    short: 'ВТБ', color: '#26de81' },
  { id: 'grodno',  label: 'Гродненская',  short: 'ГРД', color: '#ff9f43' },
  { id: 'mogilev', label: 'Могилёвская',  short: 'МГЛ', color: '#a55eea' },
  { id: 'brest',   label: 'Брестская',    short: 'БРС', color: '#45aaf2' },
  { id: 'minskcity', label: 'г. Минск',   short: 'МГ',  color: '#fd9644' },
];
const REGION_MAP = Object.fromEntries(REGIONS.map(r => [r.id, r]));

// City → region mapping
const CITY_REGION = {
  'Минск':        'minskcity',
  'Жодино':       'minsk',
  'Молодечно':    'minsk',
  'Борисов':      'minsk',
  'Солигорск':    'minsk',
  'Слуцк':        'minsk',
  'Дзержинск':    'minsk',
  'Клецк':        'minsk',
  'Фаниполь':     'minsk',
  'Гатово':       'minsk',
  'Пересады':     'minsk',
  'Городея':      'minsk',
  'Гомель':       'gomel',
  'Жлобин':       'gomel',
  'Мозырь':       'gomel',
  'Речица':       'gomel',
  'Светлогорск':  'gomel',
  'Рогачёв':      'gomel',
  'Добруш':       'gomel',
  'Наровля':      'gomel',
  'Костюковка':   'gomel',
  'Октябрьский':  'gomel',
  'Витебск':      'vitebsk',
  'Новополоцк':   'vitebsk',
  'Орша':         'vitebsk',
  'Глубокое':     'vitebsk',
  'Миоры':        'vitebsk',
  'Гродно':       'grodno',
  'Лида':         'grodno',
  'Волковыск':    'grodno',
  'Скидель':      'grodno',
  'Берёзовка':    'grodno',
  'Могилёв':      'mogilev',

// Build city -> entries map
function getCityEntries() {
  const filtered = DATA.filter(d => {
    const sectorOk = activeSector === 'all' || d.sector === activeSector;
    const regionOk = activeRegion === 'all' || CITY_REGION[d.city] === activeRegion;
    const q = searchQuery.toLowerCase();
    const textOk = !q || d.product.toLowerCase().includes(q) || d.company.toLowerCase().includes(q) || d.city.toLowerCase().includes(q);
    return sectorOk && regionOk && textOk;
  });
  const byCity = {};
  filtered.forEach(d => {
    if (!byCity[d.city]) byCity[d.city] = [];
    byCity[d.city].push(d);
  });
  return { filtered, byCity };
}

function makeMarkerIcon(color, highlighted) {
  const size = highlighted ? 18 : 12;
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:${highlighted ? '3px solid #fff' : '2px solid rgba(255,255,255,0.25)'};box-shadow:0 0 ${highlighted ? 12 : 4}px ${color};cursor:pointer;transition:all 0.2s;"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
  });
}

function getDominantColor(entries) {
  const counts = {};
  entries.forEach(e => { counts[e.sector] = (counts[e.sector]||0) + 1; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
  return SECTOR_MAP[top].color;
}

function buildMarkers() {
  // Remove all
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  const { byCity } = getCityEntries();

  Object.entries(byCity).forEach(([city, entries]) => {
    const coords = CITY_COORDS[city];
    if (!coords) return;
    const color = getDominantColor(entries);
    const m = L.marker(coords, { icon: makeMarkerIcon(color, false) });

    const popupHtml = `
      <div>
        <div class="popup-city" style="color:${color}">${city}</div>
        ${entries.map(e => `
          <div class="popup-entry">
            <div class="popup-product">${e.product}</div>
            <div class="popup-company">${e.company}</div>
            <span class="popup-sector-tag" style="background:${SECTOR_MAP[e.sector].color}22;color:${SECTOR_MAP[e.sector].color}">${SECTOR_MAP[e.sector].short}</span>
          </div>
        `).join('')}
      </div>`;

    m.bindPopup(popupHtml, { maxWidth: 280 });
    m.addTo(map);
    markers[city] = m;

    // 🥚 Easter egg
    if (city === 'Гатово') {
      m.on('contextmenu', gatevoEgg);
      m.on('click', gatevoEgg);
    }
  });
}

function buildList() {
  const { filtered } = getCityEntries();
  const container = document.getElementById('listContainer');
  const badge = document.getElementById('countBadge');

  badge.textContent = `${filtered.length} предприятий`;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">Ничего не найдено</div>';
    return;
  }

  // Group by sector
  const bySector = {};
  filtered.forEach(d => {
    if (!bySector[d.sector]) bySector[d.sector] = [];
    bySector[d.sector].push(d);
  });

  let html = '';
  SECTORS.forEach(sec => {
    const items = bySector[sec.id];
    if (!items) return;
    html += `<div class="sector-group" data-sector="${sec.id}">
      <div class="sector-header"><span class="sector-dot" style="background:${sec.color}"></span>${sec.label}</div>
      ${items.map((d, i) => {
        const idx = DATA.indexOf(d);
        return `<div class="item" data-idx="${idx}" onclick="selectItem(${idx})">
          <div class="item-name">${d.product}</div>
          <div class="item-company">${d.company}</div>
          <div class="item-city">📍 ${d.city}</div>
        </div>`;
      }).join('')}
    </div>`;
  });
  container.innerHTML = html;

  // Restore active
  if (activeItem !== null) {
    const el = container.querySelector(`[data-idx="${activeItem}"]`);
    if (el) el.classList.add('active');
  }
}

function selectItem(idx) {
  // Deselect previous
  document.querySelectorAll('.item.active').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`[data-idx="${idx}"]`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  activeItem = idx;

  const entry = DATA[idx];
  const city = entry.city;
  const coords = CITY_COORDS[city];
  if (!coords) return;

  // Reset previous highlighted marker
  if (activeMarker && markers[activeMarker]) {
    const prevEntries = getCityEntries().byCity[activeMarker] || [];
    const prevColor = prevEntries.length ? getDominantColor(prevEntries) : '#4f7fff';
    markers[activeMarker].setIcon(makeMarkerIcon(prevColor, false));
  }

  // Highlight new
  if (markers[city]) {
    markers[city].setIcon(makeMarkerIcon(SECTOR_MAP[entry.sector].color, true));
    markers[city].openPopup();
    activeMarker = city;
  }

  map.flyTo(coords, Math.max(map.getZoom(), 9), { duration: 0.8 });

  // On mobile, switch to map view automatically
  if (window.innerWidth <= 640) switchMobileTab('map');
}

function buildSectorTabs() {
  const tabs = document.getElementById('sectorTabs');
  tabs.innerHTML = `<div class="sector-tab all-tab ${activeSector==='all'?'active':''}" onclick="setSector('all')">Все</div>` +
    SECTORS.map(s => `<div class="sector-tab ${activeSector===s.id?'active':''}" onclick="setSector('${s.id}')" style="${activeSector===s.id?`background:${s.color};border-color:${s.color};color:#fff;`:''}">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${s.color};margin-right:4px;vertical-align:middle;"></span>${s.short}
    </div>`).join('');
}

function setSector(id) {
  activeSector = id;
  activeItem = null;
  activeMarker = null;
  buildSectorTabs();
  buildMarkers();
  buildList();
}

function buildRegionTabs() {
  const tabs = document.getElementById('regionTabs');
  tabs.innerHTML =
    `<div class="region-tab all-reg${activeRegion==='all'?' active':''}" onclick="setRegion('all')">Все регионы</div>` +
    REGIONS.map(r =>
      `<div class="region-tab${activeRegion===r.id?' active':''}" onclick="setRegion('${r.id}')" style="${activeRegion===r.id?`background:${r.color};border-color:${r.color}`:''}">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${r.color};margin-right:4px;vertical-align:middle"></span>${r.short}
      </div>`
    ).join('');
}

function setRegion(id) {
  activeRegion = id;
  activeItem = null;
  activeMarker = null;
  buildRegionTabs();
  buildMarkers();
  buildList();
  if (id !== 'all') {
    const regionCities = Object.entries(CITY_REGION).filter(([,r]) => r === id).map(([c]) => c);
    const coords = regionCities.map(c => CITY_COORDS[c]).filter(Boolean);
    if (coords.length) map.fitBounds(L.latLngBounds(coords).pad(0.2), { duration: 0.6 });
  } else {
    map.flyTo([53.7, 28.0], 7, { duration: 0.6 });
  }
}

// ---- QUIZ ----
function buildQuizGroups(regionId) {
  const groups = {};
  DATA.forEach(d => {
    if (!CITY_COORDS[d.city]) return;
    if (regionId !== 'all' && CITY_REGION[d.city] !== regionId) return;
    const key = d.product;
    if (!groups[key]) groups[key] = { product: key, sector: d.sector, entries: [] };
    if (!groups[key].entries.find(e => e.city === d.city))
      groups[key].entries.push({ city: d.city, company: d.company });
  });
  return Object.values(groups);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toggleQuiz() {
  if (quizMode) stopQuiz(); else showQuizRegionPicker();
}

function showQuizRegionPicker() {
  // Build grid
  const grid = document.getElementById('quizRegionGrid');
  const allGroups = buildQuizGroups('all');
  const allCount = allGroups.length;

  // "All regions" option
  let html = `<div class="qrp-option${quizRegion==='all'?' selected':''}" onclick="selectQuizRegion('all')" style="${quizRegion==='all'?'border-color:var(--accent2);background:var(--accent2)':''}">
    <span class="qrp-dot" style="background:var(--accent2)"></span>
    <span>Все регионы</span>
    <span class="qrp-count">${allCount} тем</span>
  </div>`;

  REGIONS.forEach(r => {
    const count = buildQuizGroups(r.id).length;
    if (count === 0) return;
    const sel = quizRegion === r.id;
    html += `<div class="qrp-option${sel?' selected':''}" onclick="selectQuizRegion('${r.id}')" style="${sel?`border-color:${r.color};background:${r.color}`:''}">
      <span class="qrp-dot" style="background:${r.color}"></span>
      <span>${r.label}</span>
      <span class="qrp-count">${count} тем</span>
    </div>`;
  });

}

function selectQuizRegion(id) {
  quizRegion = id;
  showQuizRegionPicker(); // re-render to update selection
}

function startQuizWithRegion() {
  document.getElementById('quizRegionPicker').classList.remove('visible');

  quizMode = true;
  quizResults = [];
  quizIndex = 0;

  const groups = buildQuizGroups(quizRegion);
  if (groups.length === 0) {
    alert('В этом регионе нет предприятий для теста!');
    return;
  }
  quizQuestions = shuffle(groups).slice(0, Math.min(QUIZ_COUNT, groups.length));

  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('mobileTabs').style.display = 'none';
  document.getElementById('quizResults').classList.remove('visible');
  document.getElementById('map').classList.add('quiz-active');
  document.getElementById('map').classList.add('mobile-visible');
  map.invalidateSize();

  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  // Zoom to region
  if (quizRegion !== 'all') {
    const regionCities = Object.entries(CITY_REGION).filter(([,r]) => r === quizRegion).map(([c]) => c);
    const coords = regionCities.map(c => CITY_COORDS[c]).filter(Boolean);
    if (coords.length) map.fitBounds(L.latLngBounds(coords).pad(0.3), { duration: 0.5 });
  } else {
    map.flyTo([53.7, 28.0], 7, { duration: 0.5 });
  }

  showQuizQuestion();
}

function drawRegionBorder(regionId) {
  if (regionBorderLayer) { map.removeLayer(regionBorderLayer); regionBorderLayer = null; }
  if (regionId === 'all') return;
  const border = REGION_BORDERS[regionId];
  if (!border) return;
  const reg = REGION_MAP[regionId];
  regionBorderLayer = L.polygon(border, {
    color: reg.color,
    weight: 3,
    opacity: 0.85,
    fillColor: reg.color,
    fillOpacity: 0.08,
    dashArray: '6,5',
  }).addTo(map);
}

function stopQuiz() {
  quizMode = false;
  document.getElementById('quizToggleBtn').classList.remove('active');
  document.getElementById('quizToggleBtn').textContent = '🎯 Тест';
  document.getElementById('quizCard').classList.remove('visible');
  document.getElementById('quizResults').classList.remove('visible');
  document.getElementById('quizRegionPicker').classList.remove('visible');
  document.getElementById('map').classList.remove('quiz-active');
  if (window.innerWidth > 640) document.getElementById('sidebar').style.display = '';
  document.getElementById('mobileTabs').style.display = '';
  clearQuizMarkers();
  if (regionBorderLayer) { map.removeLayer(regionBorderLayer); regionBorderLayer = null; }
  buildMarkers();
  if (window.innerWidth <= 640) switchMobileTab('map');
}

function clearQuizMarkers() {
  quizTempMarkers.forEach(m => map.removeLayer(m));
  quizTempMarkers = [];
}

function showQuizQuestion() {
  clearQuizMarkers();
  quizAnswered = false;

  const q = quizQuestions[quizIndex];
  quizRemainingCities = [...q.entries];
  quizFoundCities = [];

  const card = document.getElementById('quizCard');
  card.classList.add('visible');

  const n = q.entries.length;
  quizAttemptsLeft = n > 1 ? n + 1 : 1;

  document.getElementById('quizQNum').textContent = `Вопрос ${quizIndex + 1} / ${quizQuestions.length}`;
  document.getElementById('quizProduct').textContent = q.product;
  document.getElementById('quizCompany').textContent =
    n > 1 ? `Найдите ${n} города на карте` : `Найдите на карте`;
  updateQuizInstruction();
  document.getElementById('quizFeedback').style.display = 'none';
  document.getElementById('quizNextBtn').style.display = 'none';
  document.getElementById('quizProgressFill').style.width = `${(quizIndex / quizQuestions.length) * 100}%`;
}

function updateQuizInstruction() {
  const remaining = quizRemainingCities.length;
  const found = quizFoundCities.length;
  const total = quizQuestions[quizIndex].entries.length;
  if (total === 1) {
    document.getElementById('quizInstruction').textContent = '👆 Нажмите на карте где находится это предприятие';
  } else {
    document.getElementById('quizInstruction').textContent =
      `👆 Найдено: ${found}/${total} · Попыток осталось: ${quizAttemptsLeft}`;
  }
  document.getElementById('quizInstruction').style.display = '';
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function onQuizMapClick(e) {
  if (!quizMode || quizAnswered) return;

  const clicked = [e.latlng.lat, e.latlng.lng];

  // Find closest remaining city
  let bestEntry = null, bestDist = Infinity;
  quizRemainingCities.forEach(entry => {
    const c = CITY_COORDS[entry.city];
    const d = haversineKm(clicked[0], clicked[1], c[0], c[1]);
    if (d < bestDist) { bestDist = d; bestEntry = entry; }
  });

  const dist = Math.round(bestDist);
  const correct = CITY_COORDS[bestEntry.city];

  const totalCities = quizQuestions[quizIndex].entries.length;
  const isFar = dist > 100;
  const hideAnswer = isFar && totalCities > 1;

  // Every click costs an attempt
  quizAttemptsLeft--;

  // Mark click (red)
  const clickM = L.marker(clicked, {
    icon: L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;border-radius:50%;background:#fc5c65;border:2px solid #fff;box-shadow:0 0 8px #fc5c65;"></div>`,
      iconSize: [14,14], iconAnchor: [7,7]
    })
  }).addTo(map);
  quizTempMarkers.push(clickM);

  // Reveal correct pin if: close enough, OR out of attempts (show all remaining)
  const outOfAttempts = quizAttemptsLeft <= 0 && hideAnswer;

  if (!hideAnswer || outOfAttempts) {
    // If out of attempts, reveal ALL remaining cities at once
    const citiesToReveal = outOfAttempts ? quizRemainingCities : [bestEntry];
    citiesToReveal.forEach(entry => {
      const c = CITY_COORDS[entry.city];
      const correctM = L.marker(c, {
        icon: L.divIcon({
          className: '',
          html: `<div style="width:18px;height:18px;border-radius:50%;background:#26de81;border:3px solid #fff;box-shadow:0 0 14px #26de81;"></div>`,
          iconSize: [18,18], iconAnchor: [9,9]
        })
      }).addTo(map);
      correctM.bindPopup(
        `<b style="color:#26de81">${entry.city}</b><br><span style="font-size:11px;color:#7a8099">${entry.company}</span>`,
        {closeButton:false, autoPan:false}
      ).openPopup();
      quizTempMarkers.push(correctM);
    });

    // Line only for the single hit
    if (!outOfAttempts && dist > 5) {
      const line = L.polyline([clicked, correct], {
        color: '#ff9f43', weight: 2, dashArray: '5,4', opacity: 0.7
      }).addTo(map);
      quizTempMarkers.push(line);
    }
  }

  // Record — only count as found if close enough or single-city question
  if (!hideAnswer) {
    quizFoundCities.push({ city: bestEntry.city, dist, clicked, correct });
    quizRemainingCities = quizRemainingCities.filter(e => e.city !== bestEntry.city);
  }

  // If out of attempts: mark all remaining as failed (dist=999) and end question
  if (outOfAttempts) {
    quizRemainingCities.forEach(entry => {
      quizFoundCities.push({ city: entry.city, dist: 999, clicked, correct: CITY_COORDS[entry.city], failed: true });
    });
    quizRemainingCities = [];
  }

  // Show inline mini-feedback for this click
  const cls = dist <= 30 ? 'good' : dist <= 100 ? 'ok' : 'bad';
  const emoji = dist <= 30 ? '🎯' : dist <= 100 ? '👍' : '❌';
  const fb = document.getElementById('quizFeedback');
  fb.className = `quiz-feedback ${cls}`;
  fb.style.display = 'block';

  if (quizRemainingCities.length === 0) {
    // All found (or out of attempts) — show summary
    quizAnswered = true;
    const successClicks = quizFoundCities.filter(f => !f.failed);
    const failedClicks = quizFoundCities.filter(f => f.failed);
    const allDists = successClicks.map(f => f.dist);
    const avgD = allDists.length ? Math.round(allDists.reduce((a,b)=>a+b,0)/allDists.length) : 0;
    const allGood = failedClicks.length === 0 && allDists.every(d => d <= 30);
    const allOk = failedClicks.length === 0 && allDists.every(d => d <= 100);
    const overallCls = allGood ? 'good' : allOk ? 'ok' : 'bad';
    const overallEmoji = allGood ? '🎯' : allOk ? '👍' : '❌';

    fb.className = `quiz-feedback ${overallCls}`;
    if (outOfAttempts) {
      fb.className = 'quiz-feedback bad';
      document.getElementById('quizFeedbackText').textContent = `❌ Попытки закончились!`;
      document.getElementById('quizFeedbackSub').textContent =
        `Правильные ответы показаны на карте`;
    } else if (quizFoundCities.length === 1) {
      document.getElementById('quizFeedbackText').textContent = `${overallEmoji} ${bestEntry.city} — ${dist} км`;
      document.getElementById('quizFeedbackSub').textContent = '';
    } else {
      const lines = quizFoundCities.map(f => {
        const e = f.failed ? '❌' : f.dist<=30 ? '🎯' : '👍';
        return `${e} ${f.city}${f.failed ? '' : `: ${f.dist} км`}`;
      }).join(' · ');
      document.getElementById('quizFeedbackText').textContent = lines;
      document.getElementById('quizFeedbackSub').textContent = allDists.length > 1 ? `Среднее: ${avgD} км` : '';
    }

    document.getElementById('quizInstruction').style.display = 'none';

    const allPoints = quizFoundCities.flatMap(f => [f.clicked, f.correct]);
    map.fitBounds(L.latLngBounds(allPoints).pad(0.35), { duration: 0.5 });

    const nextBtn = document.getElementById('quizNextBtn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = quizIndex + 1 >= quizQuestions.length ? '📊 Результаты' : 'Следующий вопрос →';

    quizResults.push({ question: quizQuestions[quizIndex], clicks: quizFoundCities });

  } else {
    // Still more cities to find
    document.getElementById('quizFeedbackText').textContent = hideAnswer
      ? `❌ Слишком далеко! Осталось попыток: ${quizAttemptsLeft}`
      : `${emoji} ${bestEntry.city} — ${dist} км`;
    document.getElementById('quizFeedbackSub').textContent = '';
    updateQuizInstruction();
  }
}

function quizNext() {
  quizIndex++;
  if (quizIndex >= quizQuestions.length) {
    showQuizResults();
  } else {
    showQuizQuestion();
    map.flyTo([53.7, 28.0], 7, { duration: 0.5 });
  }
}

function showQuizResults() {
  document.getElementById('quizCard').classList.remove('visible');
  clearQuizMarkers();
  map.flyTo([53.7, 28.0], 7, { duration: 0.6 });

  // Flatten all clicks for overall stats
  const allClicks = quizResults.flatMap(r => r.clicks);
  const avgDist = Math.round(allClicks.reduce((s,c)=>s+c.dist,0)/allClicks.length);
  const goodQuestions = quizResults.filter(r => r.clicks.every(c=>c.dist<=30)).length;

  let emoji, title;
  if (goodQuestions >= 8) { emoji = '🏆'; title = 'Превосходно!'; }
  else if (goodQuestions >= 5) { emoji = '🎯'; title = 'Хороший результат!'; }
  else if (goodQuestions >= 3) { emoji = '📍'; title = 'Неплохо!'; }
  else { emoji = '📚'; title = 'Нужно поучить!'; }

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsScore').textContent = `Среднее отклонение: ${avgDist} км · Точно (≤30 км): ${goodQuestions}/${quizQuestions.length}`;

  const breakdown = quizResults.map(r => {
    const worstDist = Math.max(...r.clicks.map(c=>c.dist));
    const cls = worstDist<=30?'good':worstDist<=100?'ok':'bad';
    const citiesStr = r.clicks.map(c=>`${c.city} (${c.dist} км)`).join(', ');
    return `<div class="results-row">
      <span style="flex:1;margin-right:8px">${r.question.product}</span>
      <span class="results-dist ${cls}" style="text-align:right;white-space:nowrap">${citiesStr}</span>
    </div>`;
  }).join('');
  document.getElementById('resultsBreakdown').innerHTML = breakdown;
  document.getElementById('quizResults').classList.add('visible');
}

map.on('click', onQuizMapClick);


let mobileView = 'map';
function switchMobileTab(view) {
  mobileView = view;
  const sidebar = document.getElementById('sidebar');
  const mapEl = document.getElementById('map');
  const tabList = document.getElementById('tabList');
  const tabMap = document.getElementById('tabMap');
  if (view === 'list') {
    sidebar.classList.add('mobile-visible');
    mapEl.classList.remove('mobile-visible');
    tabList.classList.add('active');
    tabMap.classList.remove('active');
  } else {
    sidebar.classList.remove('mobile-visible');
    mapEl.classList.add('mobile-visible');
    tabList.classList.remove('active');
    tabMap.classList.add('active');
    map.invalidateSize();
  }
}
